<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astoria Lead FMS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Modern High-Contrast SaaS Palette */
  --bg: #F6F8FC;
  --surface: #FFFFFF;
  --nav: #0B1528;
  --border: #E2E8F0;
  --border2: #CBD5E1;
  --text: #0F172A;
  --sub: #475569;
  --dim: #94A3B8;
  
  /* Premium Accent Colors with Soft Vibrancy */
  --gold: #D97706;
  --gold-bg: #FEF3C7;
  --gold-border: #FCD34D;
  --blue: #2563EB;
  --blue-bg: #EFF6FF;
  --green: #10B981;
  --green-bg: #ECFDF5;
  --red: #EF4444;
  --red-bg: #FEF2F2;
  --orange: #F97316;
  --orange-bg: #FFF7ED;
  --purple: #8B5CF6;
  --purple-bg: #F5F3FF;
  --cyan: #06B6D4;
  --cyan-bg: #ECFEFF;
  
  /* Ultra-smooth multi-layered shadows */
  --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-lg: 0 10px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.08);
  --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* Sleek Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; transition: background 0.2s; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

input, select, textarea, button {
  font-family: 'Outfit', sans-serif;
}

.page { display: none; }
.page.active { display: flex; }

/* Login Page with Blurred Radial Glow */
#loginPage {
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  width: 100%;
  background: radial-gradient(circle at 80% 20%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
              radial-gradient(circle at 10% 80%, rgba(217, 119, 6, 0.1) 0%, transparent 50%),
              #0F172A;
  position: relative;
  overflow: hidden;
}

.login-card {
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 24px;
  width: 420px;
  padding: 48px 40px;
  position: relative;
  z-index: 1;
  box-shadow: var(--shadow-lg);
  animation: cardIn 0.6s var(--ease-premium) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: none; }
}

.l-brand { text-align: center; margin-bottom: 36px; }
.l-brand-icon {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  background: linear-gradient(135deg, #1E293B, var(--blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25);
}
.l-brand-name { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
.l-brand-name span { color: var(--blue); }
.l-brand-sub { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

.l-role-label, .l-pass-label, .mis-lbl, .fc-lbl, .fl, .form-section-title, .dec-title, .meet-sched-title, .adv-title, .quot-title, .step-num, .dcard-title, .kpi-lbl {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sub);
  margin-bottom: 10px;
}

/* Micro-interactive Grid Roles */
.role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.role-btn {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.3s var(--ease-premium);
  position: relative;
  user-select: none;
  outline: none;
}
.role-btn * { pointer-events: none; }
.role-btn:hover { border-color: var(--blue); background: var(--blue-bg); transform: translateY(-2px); }
.role-btn.sel { border-color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }
.role-icon { font-size: 24px; transition: transform 0.3s var(--ease-premium); }
.role-btn:hover .role-icon { transform: scale(1.1); }
.role-name { font-size: 11px; font-weight: 600; color: var(--sub); text-align: center; line-height: 1.3; }
.role-btn:hover .role-name, .role-btn.sel .role-name { color: var(--blue); }
.role-check {
  position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; border-radius: 50%;
  background: var(--blue); color: #fff; font-size: 10px; display: flex; align-items: center;
  justify-content: center; opacity: 0; transform: scale(0); transition: all 0.3s var(--ease-premium);
}
.role-btn.sel .role-check { opacity: 1; transform: scale(1); }

/* Form Fields Styling */
.pass-wrap { position: relative; margin-bottom: 20px; }
.pass-input, .fi, .fs {
  width: 100%; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 12px; color: var(--text); font-size: 13px; outline: none; transition: all 0.2s ease;
}
.pass-input { letter-spacing: 3px; padding-right: 48px; }
.pass-input:focus, .fi:focus, .fs:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
.pass-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--dim); cursor: pointer; font-size: 18px; transition: color 0.2s; }
.pass-toggle:hover { color: var(--sub); }

/* Premium Fluid Buttons */
.enter-btn, .add-pill, .add-btn-t, .bp {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #1E293B, var(--blue));
  border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.3s var(--ease-premium); box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
}
.enter-btn:hover, .add-pill:hover, .add-btn-t:hover, .bp:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3); }
.enter-btn:active, .bp:active { transform: translateY(0); }
.enter-btn.loading { opacity: .7; pointer-events: none; }

.l-error { text-align: center; font-size: 11px; color: var(--red); margin-top: 12px; min-height: 16px; font-weight: 500; }
.l-footer { text-align: center; margin-top: 24px; font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }

/* Core Layout Design */
#appPage { flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; background: var(--nav); flex-shrink: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.tb-brand { display: flex; align-items: center; gap: 12px; }
.tb-brand-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--gold), #FCD34D); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.tb-brand-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.tb-brand-name span { color: #FCD34D; font-weight: 400; }

.tb-nav { display: flex; height: 100%; margin-left: 32px; }
.tb-ni { display: flex; align-items: center; gap: 8px; padding: 0 20px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s ease; }
.tb-ni:hover { color: #fff; }
.tb-ni.active { color: #fff; border-bottom-color: var(--gold); font-weight: 600; }
.tb-right { display: flex; align-items: center; gap: 12px; }

.tb-pill { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid; cursor: default; display: flex; align-items: center; gap: 6px; }
.tb-pill.today { background: rgba(249, 115, 22, 0.15); border-color: rgba(249, 115, 22, 0.3); color: #FDBA74; }
.tb-pill.alert { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #FCA5A5; }
.tb-pill.role { background: rgba(217, 119, 6, 0.15); border-color: rgba(217, 119, 6, 0.3); color: #FCD34D; }

.add-pill { padding: 8px 16px; background: linear-gradient(135deg, var(--gold), #F59E0B); color: #0F172A; font-size: 12px; font-weight: 700; width: auto; box-shadow: none; }
.logout-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: none; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { border-color: rgba(239, 68, 68, 0.4); color: #FCA5A5; background: rgba(239, 68, 68, 0.05); }

.app-content { flex: 1; overflow: hidden; position: relative; }
.view { display: none; height: 100%; overflow-y: auto; }
.view.active { display: block; }
.section-wrap { padding: 28px 32px; }

/* Clean Dashboard Layout Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; cursor: pointer; transition: all 0.3s var(--ease-premium); box-shadow: var(--shadow); }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.kpi:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

.kk-gold::before { background: var(--gold); } .kk-orange::before { background: var(--orange); }
.kk-blue::before { background: var(--blue); } .kk-purple::before { background: var(--purple); }
.kk-green::before { background: var(--green); } .kk-red::before { background: var(--red); }
.kpi-val { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; letter-spacing: -1px; }

.kk-gold .kpi-val { color: var(--gold); } .kk-orange .kpi-val { color: var(--orange); } .kk-blue .kpi-val { color: var(--blue); }
.kk-purple .kpi-val { color: var(--purple); } .kk-green .kpi-val { color: var(--green); } .kk-red .kpi-val { color: var(--red); }
.kpi-sub { font-size: 11px; color: var(--dim); } .kpi-sub.ok { color: var(--green); font-weight: 500; } .kpi-sub.dn { color: var(--red); font-weight: 500; }

.dg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.dg3 { display: grid; grid-template-columns: 1fr 1fr 320px; gap: 20px; margin-bottom: 20px; }
.dg32 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

.dcard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
.dcard-hdr { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); background: #FAFBFD; }
.dcard-body { padding: 20px; }
.dcard-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }

/* Sleek Visual Funnel Bars */
.funnel-stage { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.fn-label { width: 90px; font-size: 12px; font-weight: 600; color: var(--sub); text-align: right; }
.fn-bar-wrap { flex: 1; height: 28px; background: var(--bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.fn-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 12px; font-size: 11px; font-weight: 700; color: #fff; transition: width 0.8s var(--ease-premium); }
.fn-count { width: 30px; text-align: right; font-size: 16px; font-weight: 800; color: var(--text); }
.fn-arrow { text-align: center; color: var(--dim); font-size: 11px; padding-left: 102px; margin-bottom: 6px; }

.conv-bar { margin-top: 16px; padding: 14px 18px; background: var(--green-bg); border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
.conv-lbl { font-size: 11px; color: var(--sub); font-weight: 500; } .conv-val { font-size: 22px; font-weight: 800; color: var(--green); }

/* Hotlist & Interactive Feed UI */
.hotlist { display: flex; flex-direction: column; gap: 8px; max-height: 680px; overflow-y: auto; }
.hot-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s ease; }
.hot-item:hover { border-color: var(--blue); background: var(--blue-bg); transform: translateX(2px); }
.hot-item.ov { border-color: rgba(239, 68, 68, 0.2); background: var(--red-bg); }
.hot-item.td2 { border-color: rgba(249, 115, 22, 0.2); background: var(--orange-bg); }

.h-av { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.h-info { flex: 1; min-width: 0; } .h-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-act { font-size: 11px; color: var(--dim); margin-top: 2px; }
.h-right { text-align: right; flex-shrink: 0; } .h-time { font-size: 11px; font-weight: 700; } .h-date { font-size: 10px; color: var(--dim); margin-top: 2px; }

.src-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.src-name { width: 120px; font-size: 12px; color: var(--sub); flex-shrink: 0; }
.src-bar-wrap { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.src-bar-fill { height: 100%; border-radius: 4px; } .src-cnt { width: 26px; text-align: right; font-size: 12px; font-weight: 700; }

/* Ultra-Clean Modern Tables */
.tm-table { width: 100%; border-collapse: collapse; }
.tm-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sub); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); background: #FAFBFD; }
.tm-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
.tm-table tr:last-child td { border-bottom: none; }
.tm-table tr:hover td { background: var(--bg); }

.stb-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 8px; }
.stb-icon { font-size: 16px; width: 24px; text-align: center; } .stb-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--sub); }
.stb-bar { width: 60px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; } .stb-fill { height: 100%; border-radius: 3px; }
.stb-cnt { font-size: 20px; font-weight: 800; min-width: 32px; text-align: right; }

.rev-main { font-size: 42px; font-weight: 800; color: var(--gold); line-height: 1; margin-bottom: 6px; letter-spacing: -1px; }
.rev-sub { font-size: 12px; color: var(--dim); margin-bottom: 18px; }
.rev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rev-item { padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; }
.rev-item-v { font-size: 18px; font-weight: 800; } .rev-item-l { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-top: 4px; }

.pri-wrap { display: flex; align-items: center; gap: 20px; }
.pri-legend .pri-leg-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--sub); margin-bottom: 10px; }
.pri-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; } .pri-leg-val { margin-left: auto; font-weight: 700; color: var(--text); }

/* Mission Control / MIS Stats */
.mis-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.mis-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.mis-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.mc-blue::before { background: var(--blue); } .mc-green::before { background: var(--green); } .mc-orange::before { background: var(--orange); }
.mc-red::before { background: var(--red); } .mc-purple::before { background: var(--purple); } .mc-gold::before { background: var(--gold); }
.mis-val { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 6px; letter-spacing: -1px; }

.mc-blue .mis-val { color: var(--blue); } .mc-green .mis-val { color: var(--green); } .mc-orange .mis-val { color: var(--orange); }
.mc-red .mis-val { color: var(--red); } .mc-purple .mis-val { color: var(--purple); } .mc-gold .mis-val { color: var(--gold); }
.mis-sub { font-size: 11px; color: var(--dim); }

.mis-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px; }
.mis-table { width: 100%; border-collapse: collapse; }
.mis-table thead th { background: var(--nav); color: rgba(255,255,255,0.8); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 14px 18px; text-align: left; }
.mis-table tbody tr { border-bottom: 1px solid var(--border); } .mis-table tbody tr:hover { background: var(--bg); }
.mis-table td { padding: 14px 18px; font-size: 13px; color: var(--text); vertical-align: middle; }

.mis-name-cell { display: flex; align-items: center; gap: 12px; }
.mis-av { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.mis-av-name { font-weight: 600; font-size: 13px; } .mis-av-role { font-size: 11px; color: var(--dim); margin-top: 1px; }
.mis-num { font-size: 16px; font-weight: 700; } .mis-num.blue { color: var(--blue); } .mis-num.green { color: var(--green); } .mis-num.orange { color: var(--orange); } .mis-num.red { color: var(--red); }

.score-bar { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); width: 90px; }
.score-fill { height: 100%; border-radius: 4px; } .score-pct { font-size: 13px; font-weight: 700; margin-left: 8px; }

.delay-pct { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.delay-ok { background: var(--green-bg); color: var(--green); } .delay-warn { background: var(--orange-bg); color: var(--orange); } .delay-bad { background: var(--red-bg); color: var(--red); }

.score-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.sb-excellent { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.2); }
.sb-good { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(37, 99, 235, 0.2); }
.sb-average { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(249, 115, 22, 0.2); }
.sb-poor { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.2); }

/* FMS Controls Toolbar Layout */
.fms-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
.fc { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; position: relative; overflow: hidden; box-shadow: var(--shadow); }
.fc::before { content:''; position:absolute; top:0; left:0; right:0; height:3.5px; }
.fc1::before { background: var(--gold); } .fc2::before { background: var(--orange); } .fc3::before { background: var(--blue); }
.fc4::before { background: var(--purple); } .fc5::before { background: var(--green); } .fc6::before { background: var(--red); }
.fc-val { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.fc1 .fc-val { color: var(--gold); } .fc2 .fc-val { color: var(--orange); } .fc3 .fc-val { color: var(--blue); }
.fc4 .fc-val { color: var(--purple); } .fc5 .fc-val { color: var(--green); } .fc6 .fc-val { color: var(--red); }
.fc-sub { font-size: 11px; color: var(--dim); } .fc-sub.ok { color: var(--green); } .fc-sub.dn { color: var(--red); }

.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.sbox { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; min-width: 240px; }
.sbox input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }

.date-filter-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 14px; flex-shrink: 0; }
